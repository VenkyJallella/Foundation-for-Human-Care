{% extends "base.html" %}
{% block title %}{{ page_title }} — {{ org.org_name }}{% endblock %}
{% block content %}
{% include "partials/page_header.html" with title=page_title %}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="card shadow-sm p-4 p-md-5">
          <div style="white-space: pre-line; line-height: 1.8;">{{ body }}</div>
          <hr class="my-4">
          <p class="text-muted small mb-0">
            Questions about this policy? <a href="{% url 'core:contact' %}">Contact us</a>.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
