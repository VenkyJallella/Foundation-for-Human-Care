{% extends "base.html" %}
{% block title %}Check your email — {{ org.org_name }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container text-center">
    <i class="fas fa-envelope-circle-check text-success" style="font-size:3rem;"></i>
    <h3 class="mt-3">Check your inbox</h3>
    <p class="text-muted">If an account exists for that email, we've sent a link to reset your password.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-outline-success mt-2">Back to login</a>
  </div>
</section>
{% endblock %}
