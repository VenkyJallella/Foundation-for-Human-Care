{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Register — {{ org.org_name }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card shadow-sm p-4">
          <h3 class="text-center mb-1">Join us</h3>
          <p class="text-center text-muted small mb-4">Create an account to donate, volunteer, and register for events.</p>
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-success w-100 mt-2">Create Account</button>
          </form>
          <hr>
          <p class="text-center mb-0 small">Already have an account?
            <a href="{% url 'accounts:login' %}" class="text-success fw-semibold">Login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
