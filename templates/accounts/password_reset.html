{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Reset Password — {{ org.org_name }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm p-4">
          <h3 class="text-center mb-2">Reset your password</h3>
          <p class="text-center text-muted small mb-4">Enter your email and we'll send you a reset link.</p>
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-success w-100 mt-2">Send reset link</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
