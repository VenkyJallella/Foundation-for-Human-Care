{% extends "base.html" %}
{% block title %}Password reset complete — {{ org.org_name }}{% endblock %}

{% block content %}
<section class="section">
  <div class="container text-center">
    <i class="fas fa-circle-check text-success" style="font-size:3rem;"></i>
    <h3 class="mt-3">Password reset complete</h3>
    <p class="text-muted">Your password has been set. You can now log in.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-success mt-2">Login</a>
  </div>
</section>
{% endblock %}
