{% extends "base.html" %}
{% block title %}Complete your donation — {{ org.org_name }}{% endblock %}
{% block content %}
<section class="section">
  <div class="container text-center">
    <div class="spinner-border text-success mb-3" role="status"></div>
    <h4>Opening secure payment…</h4>
    <p class="text-muted">If the payment window doesn't appear, click the button below.</p>
    <button id="payBtn" class="btn btn-success btn-lg"><i class="fas fa-lock me-2"></i>Pay ₹{{ donation.amount }}</button>

    <!-- Hidden form to post the Razorpay result back to the server -->
    <form id="resultForm" method="post" action="{% url 'donations:callback' %}" class="d-none">
      {% csrf_token %}
      <input type="hidden" name="razorpay_order_id" id="rzp_order_id">
      <input type="hidden" name="razorpay_payment_id" id="rzp_payment_id">
      <input type="hidden" name="razorpay_signature" id="rzp_signature">
    </form>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  const options = {
    key: "{{ razorpay_key_id }}",
    amount: "{{ donation.amount_paise }}",
    currency: "INR",
    name: "{{ org.org_name|escapejs }}",
    description: "Donation{% if donation.program %} — {{ donation.program.title|escapejs }}{% endif %}",
    order_id: "{{ order.id }}",
    prefill: {
      name: "{{ donation.name|escapejs }}",
      email: "{{ donation.email|escapejs }}",
      contact: "{{ donation.phone|escapejs }}"
    },
    theme: { color: "#198754" },
    handler: function (response) {
      document.getElementById('rzp_order_id').value = response.razorpay_order_id;
      document.getElementById('rzp_payment_id').value = response.razorpay_payment_id;
      document.getElementById('rzp_signature').value = response.razorpay_signature;
      document.getElementById('resultForm').submit();
    },
    modal: {
      ondismiss: function () {
        window.location.href = "{% url 'donations:donate' %}";
      }
    }
  };
  const rzp = new Razorpay(options);
  document.getElementById('payBtn').addEventListener('click', () => rzp.open());
  // Auto-open on load
  window.addEventListener('load', () => rzp.open());
</script>
{% endblock %}
