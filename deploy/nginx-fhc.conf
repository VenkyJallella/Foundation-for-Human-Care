# Nginx site config for Foundation for Human Care.
# Place at /etc/nginx/sites-available/fhc and symlink into sites-enabled.
# Replace affinix.cloud with your domain if different.

server {
    listen 80;
    server_name affinix.cloud www.affinix.cloud;

    # Allow photo uploads (gallery, programs, etc.)
    client_max_body_size 25M;

    location /static/ {
        alias /var/www/fhc/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /var/www/fhc/media/;
        expires 30d;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# After you run Certbot (see DEPLOY.md), it adds a second server block here
# for HTTPS on port 443 and redirects HTTP -> HTTPS automatically.
